name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wmctrl ffmpeg
          # wmctrl for window source tests, ffmpeg for audio extraction

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy src/terminalfx

      - name: Test
        run: pytest -v

      - name: Smoke CLI
        run: |
          terminalfx --help
          terminalfx show-config --config examples/configs/default.yaml
          terminalfx config-doctor --config examples/configs/default.yaml
