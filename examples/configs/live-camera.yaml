project_name: terminalfx-live
schema_version: 1

# 960x540 at 30fps — 4x fewer pixels than 1920x1080, 8x faster processing.
# Match this to your camera's native resolution for zero-cost normalize_frame.
resolution:
  width: 960
  height: 540
  fps: 30

preview:
  enabled: true
  mode: pixel
  refresh_hz: 30
  fullscreen: false
  display_index: 0
  transport_path: ../../run/preview-state.json
  character_width: 160
  character_height: 90

source:
  kind: camera
  path: null
  camera_index: 0
  screen_index: 0
  window_title: null
  loop: true

effects:
  - type: terminal_tint
    label: Green phosphor
    enabled: true
    params:
      palette: green
      scanlines: false
      intensity: 0.85

audio:
  enabled: false
  waveform_resolution: 128
  analysis_window_seconds: 1.0

output:
  directory: ../../output
  video_path: ../../output/render.mp4
  image_path: ../../output/frame.png
  codec: mp4v
  render_mode: offline
