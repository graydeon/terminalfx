project_name: bench-2fx
schema_version: 1

resolution:
  width: 640
  height: 360
  fps: 30

preview:
  enabled: true
  mode: pixel
  refresh_hz: 30
  fullscreen: false
  display_index: 0
  transport_path: ../../run/preview-state.json
  character_width: 160
  character_height: 90

source:
  kind: mock

effects:
  - type: ascii_quantize
    enabled: true
    params: {levels: 9, invert: false, contrast: 1.15, brightness: 0}
  - type: terminal_tint
    enabled: true
    params: {palette: green, scanlines: true, intensity: 0.85}

audio:
  enabled: false

output:
  directory: ../../output
  video_path: ../../output/render.mp4
  image_path: ../../output/frame.png
  codec: mp4v
  render_mode: offline
